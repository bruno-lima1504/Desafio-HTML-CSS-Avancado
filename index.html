<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="/SRC/CSS/reset.css">
  <link rel="stylesheet" href="/SRC/CSS/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet">

  <script src="https://kit.fontawesome.com/85a7590925.js" crossorigin="anonymous"></script>

  <title>Frontend Mentor | Huddle landing page with single introductory section</title>


</head>

<body>
  <main class="container">

    <Header class="header">
      <a href="#">
        <img src="./SRC/images/logo.svg" alt="Logo">
      </a>
    </Header>

    <div class="content">

      <div class="image">
        <img src="/SRC/images/illustration-mockups.svg" alt="">
      </div>

      <div class="text">
        <h1>Build The Community</h1>

        <h2>Your Fans Will Love</h2>

        <P>Hudle re-imagens the way we build communities. You have a voice, but so does your audience. Creat connections
          with your users as you engage in genuine discussion</P>

        <a href="#" class="button">Register</a>
      </div>

    </div>

    <footer class="footer">

        <a href="">
          <i class="fab fa-facebook-square"></i>
        </a>

        <a href="">
          <i class="fab fa-instagram"></i>
        </a>

        <a href="">
          <i class="fab fa-twitter-square"></i>
        </a>

    </footer>
  </main>
</body>

</html>
